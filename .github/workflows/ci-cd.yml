name: Production CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-validate:
    name: Build & Validate Services
    runs-on: ubuntu-latest
    
    # Inject all secrets into the step environment
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ALLOWED_DOMAIN: ${{ secrets.ALLOWED_DOMAIN }}
      CLIENT_URL: ${{ secrets.CLIENT_URL }}
      SOURCE_URI: ${{ secrets.SOURCE_URI }}
      TARGET_URI: ${{ secrets.TARGET_URI }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_ALLOWED_DOMAIN: ${{ secrets.VITE_ALLOWED_DOMAIN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build and Spin Up Containers
        run: docker compose up --build -d

      - name: Verify Service Connectivity
        run: |
          echo "Waiting for services to initialize..."
          sleep 10
          
          # Check if the backend application is up and healthy
          if [ "$(docker inspect -f '{{.State.Running}}' $(docker compose ps -q backend))" = "true" ]; then
            echo "Backend successfully built and connected to production resources."
          else
            echo "Backend container failed to run with the provided environment configurations."
            docker compose logs backend
            exit 1
          fi

          # Check if the frontend container is up
          if [ "$(docker inspect -f '{{.State.Running}}' $(docker compose ps -q frontend))" = "true" ]; then
            echo "Frontend successfully built and running."
          else
            echo "Frontend build stage failed."
            docker compose logs frontend
            exit 1
          fi

      - name: Clean up Containers
        if: always()
        run: docker compose down

  deploy:
    name: Trigger Production Deployment
    needs: build-and-validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend and Wait
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
        run: |
          echo "🚀 Triggering backend deployment..."
          
          # 1. Trigger the deploy and save the response
          DEPLOY_RES=$(curl -s -X POST https://api.render.com/v1/services/$SERVICE_ID/deploys \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json")
            
          # 2. Extract the Deploy ID using jq
          DEPLOY_ID=$(echo $DEPLOY_RES | jq -r '.id')
          
          if [ "$DEPLOY_ID" == "null" ] || [ -z "$DEPLOY_ID" ]; then
            echo "❌ Failed to trigger deploy. Render response: $DEPLOY_RES"
            exit 1
          fi
          
          echo "✅ Deployment triggered! ID: $DEPLOY_ID"
          echo "⏳ Waiting for Render to finish building..."
          
          # 3. Loop and poll the status every 15 seconds
          while true; do
            STATUS_RES=$(curl -s -X GET https://api.render.com/v1/services/$SERVICE_ID/deploys/$DEPLOY_ID \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json")
              
            STATUS=$(echo $STATUS_RES | jq -r '.status')
            echo "Current status: $STATUS"
            
            if [ "$STATUS" == "live" ]; then
              echo "🎉 Backend deployed successfully!"
              break
            elif [[ "$STATUS" == "build_failed" || "$STATUS" == "update_failed" || "$STATUS" == "canceled" ]]; then
              echo "❌ Backend deployment failed on Render! Halting workflow."
              exit 1
            fi
            
            sleep 15
          done

      - name: Deploy Frontend (Only runs if Backend succeeds)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
        run: |
          echo "🚀 Triggering frontend deployment..."
          
          # Since this is the last step, we don't necessarily need to wait for it, 
          # but we trigger it the exact same way.
          curl -s -X POST https://api.render.com/v1/services/$SERVICE_ID/deploys \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json"
            
          echo "✅ Frontend deployment triggered!"